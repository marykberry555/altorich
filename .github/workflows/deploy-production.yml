name: Deploy production

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type DEPLOY to run production deploy (auto push deploy disabled during SEV-1)"
        required: true
        default: ""

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to cPanel Node
    if: github.event.inputs.confirm == 'DEPLOY'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure SSH
        env:
          CPANEL_DEPLOY_KEY: ${{ secrets.CPANEL_DEPLOY_KEY }}
        run: |
          if [ -z "$CPANEL_DEPLOY_KEY" ]; then
            echo "::error::CPANEL_DEPLOY_KEY secret is not configured — production was NOT updated."
            echo "Add the cPanel SSH private key as repository secret CPANEL_DEPLOY_KEY, then re-run this workflow."
            echo "Until then, deploy manually: cPanel Git → Pull/Deploy, or run ./deploy.sh cpanel from a machine with SSH access."
            exit 1
          fi
          mkdir -p ~/.ssh
          printf '%s\n' "$CPANEL_DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p 21098 162.254.39.13 >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Prepare cPanel remote for push
        env:
          CPANEL_DEPLOY_KEY: ${{ secrets.CPANEL_DEPLOY_KEY }}
        run: |
          if [ ! -f ~/.ssh/deploy_key ]; then
            exit 0
          fi
          ssh -i ~/.ssh/deploy_key -p 21098 -o StrictHostKeyChecking=accept-new altosujd@162.254.39.13 bash -s <<'EOF'
          set -euo pipefail
          cd /home/altosujd/repositories/alto-app
          git reset --hard HEAD
          git clean -fd --exclude=.env.production --exclude=.env.local 2>/dev/null || git clean -fd
          EOF

      - name: Push to cPanel production Git
        env:
          CPANEL_DEPLOY_KEY: ${{ secrets.CPANEL_DEPLOY_KEY }}
        run: |
          if [ ! -f ~/.ssh/deploy_key ]; then
            echo "No deploy key — nothing to push."
            exit 0
          fi
          git remote add production "ssh://altosujd@162.254.39.13:21098/home/altosujd/repositories/alto-app" 2>/dev/null || \
            git remote set-url production "ssh://altosujd@162.254.39.13:21098/home/altosujd/repositories/alto-app"
          # Note: DEPLOY_ENABLED on the Actions runner does NOT reach cPanel's .cpanel.yml.
          # Code sync only — build/restart is the next SSH step.
          GIT_SSH_COMMAND='ssh -i ~/.ssh/deploy_key -p 21098 -o StrictHostKeyChecking=accept-new' \
            git push production main

      - name: Build and restart on cPanel
        env:
          CPANEL_DEPLOY_KEY: ${{ secrets.CPANEL_DEPLOY_KEY }}
        run: |
          if [ ! -f ~/.ssh/deploy_key ]; then
            exit 0
          fi
          # .cpanel.yml intentionally skips build unless DEPLOY_ENABLED=1 on the server.
          ssh -i ~/.ssh/deploy_key -p 21098 \
            -o StrictHostKeyChecking=accept-new \
            -o ServerAliveInterval=20 \
            -o ServerAliveCountMax=60 \
            altosujd@162.254.39.13 bash -s <<'EOF'
          set -euo pipefail
          cd /home/altosujd/repositories/alto-app
          git fetch origin main 2>/dev/null || true
          git reset --hard HEAD
          git clean -fd --exclude=.env.production --exclude=.env.local 2>/dev/null || git clean -fd
          echo "[deploy] HEAD=$(git rev-parse --short HEAD) $(git log -1 --pretty=%s)"
          export DEPLOY_ENABLED=1
          export APP_ROOT=/home/altosujd/repositories/alto-app
          export LOG_DIR=/home/altosujd/logs
          mkdir -p "$LOG_DIR"
          # Detach from Actions SSH so long webpack builds are not killed by session flaps (exit 255).
          nohup env DEPLOY_ENABLED=1 APP_ROOT="$APP_ROOT" LOG_DIR="$LOG_DIR" \
            bash scripts/deploy/deploy-production.sh \
            >"$LOG_DIR/deploy-actions-last.log" 2>&1 &
          echo "[deploy] started background PID=$! — log: $LOG_DIR/deploy-actions-last.log"
          sleep 2
          tail -n 20 "$LOG_DIR/deploy-actions-last.log" || true
          EOF

      - name: Wait for production health
        env:
          CPANEL_DEPLOY_KEY: ${{ secrets.CPANEL_DEPLOY_KEY }}
        run: |
          if [ ! -f ~/.ssh/deploy_key ]; then
            exit 0
          fi
          echo "Waiting for cPanel build + Node restart..."
          # Builds often take several minutes; curl -f must not abort the loop under bash -e.
          sleep 90
          for i in $(seq 1 60); do
            health="$(curl -sS --max-time 15 https://altorich.com/api/health || true)"
            if echo "$health" | grep -q '"status"[[:space:]]*:[[:space:]]*"ok"'; then
              html="$(curl -sS --max-time 20 -H 'Cache-Control: no-cache' "https://altorich.com/?_=$(date +%s)" || true)"
              if echo "$html" | grep -q 'Grow Your Capital With Confidence' && echo "$html" | grep -q 'Meet Our Leadership' && echo "$html" | grep -q 'Karol Kemp'; then
                echo "Production health OK + homepage copy + leadership verified"
                curl -sS --max-time 15 https://altorich.com/site.webmanifest | grep -q '"/auth/login"' && echo "PWA start_url OK"
                code="$(curl -sS -o /dev/null -w '%{http_code}' --max-time 15 -H 'Cache-Control: no-cache' https://altorich.com/packages || true)"
                echo "Packages page HTTP $code"
                [ "$code" = "200" ] && echo "Packages page OK"
                exit 0
              fi
              echo "Attempt $i/60 — site healthy but new homepage markers not visible yet..."
            else
              echo "Attempt $i/60 — health not ready..."
            fi
            sleep 20
          done
          echo "Production verification timed out"
          exit 1
