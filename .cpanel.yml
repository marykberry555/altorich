---
# cPanel Git deployment — git push updates code only; never builds unless explicitly enabled.
# Production deploy: DEPLOY_ENABLED=1 bash scripts/deploy/deploy-production.sh
deployment:
  tasks:
    - export APP_ROOT=/home/altosujd/repositories/alto-app
    - export LOG_DIR=/home/altosujd/logs
    - echo "[deploy] Git pull complete. Build/restart requires DEPLOY_ENABLED=1 + deploy-production.sh"
    - test "${DEPLOY_ENABLED:-0}" = "1" || exit 0
    - /bin/bash $APP_ROOT/scripts/deploy/post-deploy.sh
